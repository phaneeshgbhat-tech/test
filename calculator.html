<!DOCTYPE html>
<html>
<head>
  
  <link rel="stylesheet" href="calculator.css">
  <title>Calculator</title>
  
</head>
<body>
  
  <div class="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
      <button>C</button>
      <button>^</button>
      <button>%</button>
      <button class="operator">÷</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">×</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">−</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">+</button>

      <button>0</button>
      <button>.</button>
      <button class="equal">=</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
